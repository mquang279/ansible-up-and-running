- name: Install Nginx
  package:
    name: nginx
    update_cache: yes
  become: true

- name: Create Nginx config from template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    mode: "0644"
  notify: Restart Nginx
  become: true

- name: Create index.html
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: "0644"
  become: true
